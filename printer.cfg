# JUST A NOTE, THIS REQUIRES THE FOLLOWING KLIPPER MODULE TO FUNCTION: https://github.com/Annex-Engineering/klipper/blob/master/klippy/extras/dockable_probe.py
# Documentation can be found here: https://github.com/Annex-Engineering/klipper/blob/master/docs/Dockable_Probe.md
# MCU Octopus
[mcu] 
#serial: /dev/serial/by-id/usb-Klipper_stm32f429xx_3B001A001350304738313820-if00
serial: /dev/ttyAMA0
restart_method: command
baud: 250000

[printer]
kinematics: cartesian
max_velocity: 2000
max_accel: 40000
max_z_velocity: 60
max_z_accel: 300
square_corner_velocity: 20.0 # 12was start at 8, but then increase once you're sure assembly is sound

[gcode_arcs]
resolution: 0.1

[idle_timeout]
timeout: 3600
gcode:
    _CASELIGHT_OFF
    TURN_OFF_HEATERS
    SET_PIN PIN=caselight_led VALUE=0.1
    M84

#Input Shaper Settings
[input_shaper]
shaper_freq_x: 53
shaper_freq_y: 53
shaper_type: mzv

[include stepper.cfg]
[include extruder.cfg]
[include heater.cfg]
[include sensor.cfg]
[include cooling.cfg]
#[include idm.cfg]
[include cartographer.cfg]
[include mainsail.cfg]
[include include/*.cfg]
#[include inputshaper.cfg]

[exclude_object]

[idle_timeout]
timeout: 2400
gcode:
    TURN_OFF_HEATERS
    TURN_FANS_OFF
    _CASELIGHT_OFF
    M84


[force_move]
enable_force_move: True

